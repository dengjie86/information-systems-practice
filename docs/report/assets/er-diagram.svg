<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 880" font-family="'Microsoft YaHei','SimHei','Segoe UI',sans-serif">
  <style>
    .entity-title { font-weight: bold; font-size: 15px; }
    .entity-sub   { font-style: italic; font-size: 11px; fill: #555; }
    .attr         { font-size: 11px; }
    .pk           { font-size: 11px; text-decoration: underline; }
    .rel-label    { font-weight: bold; font-size: 13px; }
    .rel-sub      { font-size: 10px; fill: #444; }
    .card         { font-size: 12px; font-style: italic; fill: #b83; }
    .title-bar    { fill: #dbe4f0; stroke: #333; stroke-width: 1.4; }
    .body         { fill: #ffffff; stroke: #333; stroke-width: 1.4; }
    .diamond      { fill: #fff8dc; stroke: #333; stroke-width: 1.4; }
    .line         { stroke: #333; stroke-width: 1.4; fill: none; }
    .title        { font-size: 20px; font-weight: bold; }
    .subtitle     { font-size: 12px; fill: #666; }
  </style>

  <!-- 标题 -->
  <text x="700" y="32" text-anchor="middle" class="title">校园宿舍报修与工单管理系统 · E-R 图</text>
  <text x="700" y="52" text-anchor="middle" class="subtitle">库名 dorm_repair    编码 utf8mb4    引擎 InnoDB</text>

  <!-- ========== 实体：repair_category（上） ========== -->
  <g>
    <rect x="600" y="80"  width="200" height="30" class="title-bar"/>
    <rect x="600" y="110" width="200" height="128" class="body"/>
    <text x="700" y="100" text-anchor="middle" class="entity-title">repair_category</text>
    <text x="700" y="128" text-anchor="middle" class="entity-sub">故障分类</text>
    <text x="615" y="150" class="pk">ID</text>
    <text x="615" y="168" class="attr">category_name</text>
    <text x="615" y="186" class="attr">description</text>
    <text x="615" y="204" class="attr">sort_order</text>
    <text x="615" y="222" class="attr">status</text>
  </g>

  <!-- ========== 实体：user（左） ========== -->
  <g>
    <rect x="60"  y="330" width="200" height="30" class="title-bar"/>
    <rect x="60"  y="360" width="200" height="220" class="body"/>
    <text x="160" y="350" text-anchor="middle" class="entity-title">user</text>
    <text x="160" y="378" text-anchor="middle" class="entity-sub">用户（学生 / 管理员 / 维修员）</text>
    <text x="75"  y="400" class="pk">ID</text>
    <text x="75"  y="418" class="attr">username</text>
    <text x="75"  y="436" class="attr">password</text>
    <text x="75"  y="454" class="attr">real_name</text>
    <text x="75"  y="472" class="attr">role</text>
    <text x="75"  y="490" class="attr">phone</text>
    <text x="75"  y="508" class="attr">dorm_building</text>
    <text x="75"  y="526" class="attr">dorm_room</text>
    <text x="75"  y="544" class="attr">avatar</text>
    <text x="75"  y="562" class="attr">status</text>
  </g>

  <!-- ========== 实体：repair_order（中 · 核心） ========== -->
  <g>
    <rect x="580" y="330" width="240" height="30" class="title-bar"/>
    <rect x="580" y="360" width="240" height="310" class="body"/>
    <text x="700" y="350" text-anchor="middle" class="entity-title">repair_order</text>
    <text x="700" y="378" text-anchor="middle" class="entity-sub">报修工单（核心表）</text>
    <text x="595" y="400" class="pk">ID</text>
    <text x="595" y="418" class="attr">order_no (UQ)</text>
    <text x="595" y="436" class="attr">title</text>
    <text x="595" y="454" class="attr">description</text>
    <text x="595" y="472" class="attr">image_url</text>
    <text x="595" y="490" class="attr">dorm_building</text>
    <text x="595" y="508" class="attr">dorm_room</text>
    <text x="595" y="526" class="attr">contact_phone</text>
    <text x="595" y="544" class="attr">status</text>
    <text x="595" y="562" class="attr">priority</text>
    <text x="595" y="580" class="attr">reject_reason</text>
    <text x="595" y="598" class="attr">admin_remark</text>
    <text x="595" y="616" class="attr">submit_time</text>
    <text x="595" y="634" class="attr">assign_time</text>
    <text x="595" y="652" class="attr">finish_time</text>
  </g>

  <!-- ========== 实体：repair_record（右） ========== -->
  <g>
    <rect x="1140" y="360" width="200" height="30" class="title-bar"/>
    <rect x="1140" y="390" width="200" height="200" class="body"/>
    <text x="1240" y="380" text-anchor="middle" class="entity-title">repair_record</text>
    <text x="1240" y="408" text-anchor="middle" class="entity-sub">维修记录</text>
    <text x="1155" y="430" class="pk">ID</text>
    <text x="1155" y="448" class="attr">action_type</text>
    <text x="1155" y="466" class="attr">action_desc</text>
    <text x="1155" y="484" class="attr">result_image</text>
    <text x="1155" y="502" class="attr">status_before</text>
    <text x="1155" y="520" class="attr">status_after</text>
    <text x="1155" y="538" class="attr">action_time</text>
  </g>

  <!-- ========== 实体：evaluation（下） ========== -->
  <g>
    <rect x="590" y="740" width="220" height="30" class="title-bar"/>
    <rect x="590" y="770" width="220" height="90" class="body"/>
    <text x="700" y="760" text-anchor="middle" class="entity-title">evaluation</text>
    <text x="700" y="788" text-anchor="middle" class="entity-sub">学生评价</text>
    <text x="605" y="810" class="pk">ID</text>
    <text x="605" y="828" class="attr">score (1-5)</text>
    <text x="605" y="846" class="attr">content</text>
  </g>

  <!-- ========== 联系：belongs_to（category ↔ order） ========== -->
  <line x1="700" y1="238" x2="700" y2="270" class="line"/>
  <polygon points="700,270 770,295 700,320 630,295" class="diamond"/>
  <text x="700" y="292" text-anchor="middle" class="rel-label">belongs_to</text>
  <text x="700" y="308" text-anchor="middle" class="rel-sub">属于</text>
  <line x1="700" y1="320" x2="700" y2="330" class="line"/>
  <text x="682" y="262" class="card">1</text>
  <text x="682" y="326" class="card">N</text>

  <!-- ========== 联系：submits（user ↔ order，学生角色） ========== -->
  <line x1="260" y1="420" x2="320" y2="420" class="line"/>
  <polygon points="320,420 400,395 480,420 400,445" class="diamond"/>
  <text x="400" y="417" text-anchor="middle" class="rel-label">submits</text>
  <text x="400" y="432" text-anchor="middle" class="rel-sub">提交 · 学生</text>
  <line x1="480" y1="420" x2="580" y2="420" class="line"/>
  <text x="290" y="414" class="card">1</text>
  <text x="555" y="414" class="card">N</text>

  <!-- ========== 联系：assigned_to（user ↔ order，维修员角色） ========== -->
  <line x1="260" y1="520" x2="320" y2="520" class="line"/>
  <polygon points="320,520 400,495 480,520 400,545" class="diamond"/>
  <text x="400" y="517" text-anchor="middle" class="rel-label">assigned_to</text>
  <text x="400" y="532" text-anchor="middle" class="rel-sub">派单 · 维修员</text>
  <line x1="480" y1="520" x2="580" y2="520" class="line"/>
  <text x="290" y="514" class="card">1</text>
  <text x="555" y="514" class="card">N</text>

  <!-- ========== 联系：has_record（order ↔ record） ========== -->
  <line x1="820" y1="480" x2="900" y2="480" class="line"/>
  <polygon points="900,480 980,455 1060,480 980,505" class="diamond"/>
  <text x="980" y="477" text-anchor="middle" class="rel-label">has</text>
  <text x="980" y="492" text-anchor="middle" class="rel-sub">处理记录</text>
  <line x1="1060" y1="480" x2="1140" y2="480" class="line"/>
  <text x="845" y="474" class="card">1</text>
  <text x="1105" y="474" class="card">N</text>

  <!-- ========== 联系：has_evaluation（order ↔ evaluation） ========== -->
  <line x1="700" y1="670" x2="700" y2="685" class="line"/>
  <polygon points="700,685 770,710 700,735 630,710" class="diamond"/>
  <text x="700" y="707" text-anchor="middle" class="rel-label">evaluated_by</text>
  <text x="700" y="722" text-anchor="middle" class="rel-sub">评价</text>
  <line x1="700" y1="735" x2="700" y2="740" class="line"/>
  <text x="682" y="680" class="card">1</text>
  <text x="682" y="744" class="card">0..1</text>

  <!-- ========== 图例 ========== -->
  <g>
    <rect x="30" y="720" width="280" height="140" fill="#fafafa" stroke="#999" stroke-width="1"/>
    <text x="40" y="740" font-weight="bold" font-size="12">图例</text>
    <rect x="40" y="748" width="70" height="18" class="title-bar"/>
    <rect x="40" y="766" width="70" height="18" class="body"/>
    <text x="120" y="762" font-size="11">矩形 = 实体</text>
    <polygon points="40,802 70,790 100,802 70,814" class="diamond"/>
    <text x="120" y="806" font-size="11">菱形 = 联系</text>
    <text x="40" y="830" class="pk">ID</text>
    <text x="120" y="830" font-size="11">下划线 = 主键</text>
    <text x="40" y="850" class="card">1  N  0..1</text>
    <text x="120" y="850" font-size="11">基数（联系端点）</text>
  </g>
</svg>
