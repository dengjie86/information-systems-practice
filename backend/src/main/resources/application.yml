spring:
  application:
    name: dorm-repair-backend
  profiles:
    active: dev
  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 5MB

server:
  port: 8080

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

jwt:
  secret: dorm-repair-jwt-secret-key-please-change-in-production-2026
  expire-seconds: 7200

file:
  upload-dir: ${user.dir}/uploads
